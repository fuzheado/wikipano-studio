<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wikimedia Photosphere Tour Viewer - Phase 1 Prototype</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum@2.5.7/build/pannellum.css"/>
    <script src="https://cdn.jsdelivr.net/npm/pannellum@2.5.7/build/pannellum.js"></script>
    <style>
        :root {
            --bg: #1a1a2e;
            --surface: #16213e;
            --text: #e0e0e0;
            --accent: #0f3460;
            --highlight: #e94560;
            --muted: #888;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ── Header ─────────────────────────────────── */
        header {
            background: var(--surface);
            padding: 12px 20px;
            display: flex;
            align-items: center;
            gap: 16px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            flex-shrink: 0;
        }
        header h1 {
            font-size: 1.1rem;
            font-weight: 600;
            white-space: nowrap;
        }
        header .subtitle {
            font-size: 0.8rem;
            color: var(--muted);
        }

        /* ── URL bar ────────────────────────────────── */
        .url-bar {
            display: flex;
            gap: 8px;
            flex: 1;
            min-width: 0;
        }
        .url-bar input {
            flex: 1;
            padding: 8px 12px;
            background: var(--bg);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 6px;
            color: var(--text);
            font-size: 0.9rem;
            min-width: 0;
        }
        .url-bar input:focus {
            outline: none;
            border-color: var(--highlight);
        }
        .url-bar button {
            padding: 8px 16px;
            background: var(--highlight);
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 600;
            white-space: nowrap;
        }
        .url-bar button:hover {
            filter: brightness(1.1);
        }

        /* ── Main layout ────────────────────────────── */
        main {
            flex: 1;
            display: flex;
            min-height: 0;
        }

        /* ── Viewer ─────────────────────────────────── */
        #panorama {
            flex: 1;
            min-width: 0;
            background: #000;
        }
        #panorama .pnlm-container {
            /* Pannellum creates its own container */
        }

        /* ── Sidebar ────────────────────────────────── */
        aside {
            width: 320px;
            background: var(--surface);
            border-left: 1px solid rgba(255,255,255,0.1);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            flex-shrink: 0;
        }
        aside h2 {
            padding: 16px 20px 8px;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--muted);
        }

        /* Scene list */
        .scene-list {
            list-style: none;
        }
        .scene-list li {
            padding: 10px 20px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.9rem;
            transition: background 0.15s;
        }
        .scene-list li:hover {
            background: rgba(255,255,255,0.05);
        }
        .scene-list li.active {
            background: var(--accent);
            font-weight: 600;
        }
        .scene-list li .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--highlight);
            flex-shrink: 0;
        }
        /* Scene list thumbnails */
        .scene-list li .thumb {
            width: 40px;
            height: 40px;
            border-radius: 4px;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            flex-shrink: 0;
            background-color: rgba(255,255,255,0.05);
        }
        .scene-list li .name {
            flex: 1;
            min-width: 0;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        /* Tour info */
        .tour-info {
            padding: 16px 20px;
            font-size: 0.8rem;
            color: var(--muted);
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .tour-info .label {
            font-weight: 600;
            color: var(--text);
        }

        /* Status bar */
        .status {
            padding: 10px 20px;
            font-size: 0.8rem;
            background: var(--bg);
            border-top: 1px solid rgba(255,255,255,0.1);
            min-height: 40px;
            display: flex;
            align-items: center;
        }
        .status.error { color: var(--highlight); }
        .status.loading { color: #f0ad4e; }
        .status.ok { color: #5cb85c; }

        /* Wikipedia card tooltips */
        .wp-card-tooltip {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            background: #1a1a2e;
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 8px;
            width: 260px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.6);
            overflow: hidden;
            pointer-events: auto;
            font-size: 0.82rem;
            line-height: 1.4;
            z-index: 100;
        }
        .wp-card-tooltip img {
            width: 100%;
            max-height: 140px;
            object-fit: cover;
        }
        .wp-card-body {
            padding: 12px 14px;
        }
        .wp-card-body h3 {
            margin: 0 0 6px 0;
            font-size: 0.95rem;
            color: #fff;
        }
        .wp-card-body p {
            margin: 0 0 10px 0;
            color: #aaa;
            font-size: 0.78rem;
        }
        .wp-card-link {
            color: #5bc0de;
            text-decoration: none;
            font-size: 0.78rem;
        }
        .wp-card-link:hover { text-decoration: underline; }
        .wp-card-loading {
            padding: 20px;
            text-align: center;
            color: #888;
            font-size: 0.8rem;
        }
        .wp-card-hotspot .pnlm-tooltip {
            display: none !important;
        }

        /* Wikipedia cards hidden by default - shown on click */
        .wp-card-tooltip { display: none; }
        .wp-card-tooltip.visible { display: block; }

        /* Stop pulsing animation when card is open (prevents card content from flickering) */
        .wp-card-hotspot:has(.wp-card-tooltip.visible) { animation: none !important; }

        /* Close button for info popups */
        .info-popup-close {
            position: absolute; top: 6px; right: 8px;
            background: rgba(0,0,0,0.5); border: none; color: #fff;
            font-size: 16px; cursor: pointer; width: 24px; height: 24px;
            border-radius: 50%; display: flex; align-items: center;
            justify-content: center; z-index: 101; line-height: 1;
        }
        .info-popup-close:hover { background: rgba(233,69,96,0.8); }

        /* ── Icon Size Variants (viewer) ─────────────────── */
        /* Normal (default): base sizes defined per type */

        /* Small: compact for dense areas */
        .scene-hotspot.icon-small,
        .info-hotspot.icon-small,
        .audio-hotspot.icon-small,
        .video-hotspot.icon-small,
        .wp-card-hotspot.icon-small {
            height: 32px !important;
            width: 32px !important;
        }
        .scene-hotspot.icon-small::after,
        .info-hotspot.icon-small::after,
        .audio-hotspot.icon-small::after,
        .video-hotspot.icon-small::after,
        .wp-card-hotspot.icon-small::after {
            font-size: 14px !important;
        }

        /* Large: more prominent */
        .scene-hotspot.icon-large,
        .info-hotspot.icon-large,
        .audio-hotspot.icon-large,
        .video-hotspot.icon-large,
        .wp-card-hotspot.icon-large {
            height: 60px !important;
            width: 60px !important;
        }
        .scene-hotspot.icon-large::after,
        .info-hotspot.icon-large::after,
        .audio-hotspot.icon-large::after,
        .video-hotspot.icon-large::after,
        .wp-card-hotspot.icon-large::after {
            font-size: 26px !important;
        }

        /* Huge: hero/attention hotspots */
        .scene-hotspot.icon-huge,
        .info-hotspot.icon-huge,
        .audio-hotspot.icon-huge,
        .video-hotspot.icon-huge,
        .wp-card-hotspot.icon-huge {
            height: 80px !important;
            width: 80px !important;
        }
        .scene-hotspot.icon-huge::after,
        .info-hotspot.icon-huge::after,
        .audio-hotspot.icon-huge::after,
        .video-hotspot.icon-huge::after,
        .wp-card-hotspot.icon-huge::after {
            font-size: 34px !important;
        }

        /* Scene hotspot: red arrow (matching studio) */
        .scene-hotspot {
            height: 50px !important;
            width: 50px !important;
            background: #e94560 !important;
            border-radius: 50% !important;
            border: 3px solid #fff !important;
            box-shadow: 0 0 18px rgba(233, 69, 96, 0.8), 0 0 40px rgba(233, 69, 96, 0.3) !important;
            animation: scene-pulse 2s ease-in-out infinite;
        }
        .scene-hotspot::after {
            content: '➤';
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            color: #fff;
            line-height: 1;
            z-index: 999;
        }
        .scene-hotspot.pnlm-sprite {
            background-image: none !important;
        }
        @keyframes scene-pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        /* Info hotspot: blue circle with i (matching studio) */
        .info-hotspot {
            height: 44px !important;
            width: 44px !important;
            background: #5bc0de !important;
            border-radius: 50% !important;
            border: 3px solid #fff !important;
            box-shadow: 0 0 18px rgba(91, 192, 222, 0.8), 0 0 40px rgba(91, 192, 222, 0.3) !important;
            animation: info-pulse 2s ease-in-out infinite;
        }
        .info-hotspot::after {
            content: 'i';
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            font-weight: bold;
            color: #fff;
            line-height: 1;
            z-index: 999;
        }
        .info-hotspot.pnlm-sprite {
            background-image: none !important;
        }
        @keyframes info-pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        /* Wikipedia card hotspot: same as info-hotspot (blue i) */
        .wp-card-hotspot {
            height: 44px !important;
            width: 44px !important;
            background: #5bc0de !important;
            border-radius: 50% !important;
            border: 3px solid #fff !important;
            box-shadow: 0 0 18px rgba(91, 192, 222, 0.8), 0 0 40px rgba(91, 192, 222, 0.3) !important;
            animation: info-pulse 2s ease-in-out infinite;
        }
        .wp-card-hotspot::after {
            content: 'i';
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            font-weight: bold;
            color: #fff;
            line-height: 1;
            z-index: 999;
        }
        .wp-card-hotspot.pnlm-sprite {
            background-image: none !important;
        }

        /* Audio hotspot: styled like the studio's green 🎵 icon */
        .audio-hotspot {
            height: 44px !important;
            width: 44px !important;
            background: #2d6a4f !important;
            border-radius: 50% !important;
            border: 3px solid #fff !important;
            box-shadow: 0 0 18px rgba(45, 106, 79, 0.8), 0 0 40px rgba(45, 106, 79, 0.3) !important;
            animation: audio-wave-viewer 1.2s ease-in-out infinite;
            transition: box-shadow 0.3s !important;
        }
        .audio-hotspot::after {
            content: '🎵';
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            color: #fff;
            line-height: 1;
            z-index: 999;
        }
        .audio-hotspot.pnlm-sprite {
            background-image: none !important;
        }
        @keyframes audio-wave-viewer {
            0%, 100% { box-shadow: 0 0 18px rgba(45, 106, 79, 0.8), 0 0 40px rgba(45, 106, 79, 0.3); }
            50% { box-shadow: 0 0 32px rgba(45, 106, 79, 1), 0 0 70px rgba(45, 106, 79, 0.6); }
        }

        /* Audio hotspot: extra glow when actively playing */
        .audio-hotspot.playing {
            box-shadow: 0 0 28px rgba(100, 200, 150, 1), 0 0 60px rgba(100, 200, 150, 0.6) !important;
            animation: audio-play-pulse 0.8s ease-in-out infinite;
        }
        @keyframes audio-play-pulse {
            0%, 100% { box-shadow: 0 0 28px rgba(100, 200, 150, 1), 0 0 60px rgba(100, 200, 150, 0.6); }
            50% { box-shadow: 0 0 44px rgba(100, 200, 150, 1), 0 0 90px rgba(100, 200, 150, 0.8); }
        }

        /* Video hotspot: purple play button */
        .video-hotspot {
            height: 48px !important;
            width: 48px !important;
            background: #7c3aed !important;
            border-radius: 50% !important;
            border: 3px solid #fff !important;
            box-shadow: 0 0 18px rgba(124, 58, 237, 0.8), 0 0 40px rgba(124, 58, 237, 0.3) !important;
            animation: video-glow-v 1.5s ease-in-out infinite;
        }
        .video-hotspot::after {
            content: '▶️';
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            color: #fff;
            line-height: 1;
            z-index: 999;
        }
        .video-hotspot.pnlm-sprite {
            background-image: none !important;
        }
        @keyframes video-glow-v {
            0%, 100% { box-shadow: 0 0 18px rgba(124, 58, 237, 0.8), 0 0 40px rgba(124, 58, 237, 0.3); }
            50% { box-shadow: 0 0 32px rgba(124, 58, 237, 1), 0 0 70px rgba(124, 58, 237, 0.6); }
        }

        /* ── Footer ─────────────────────────────────── */
        footer {
            background: var(--surface);
            padding: 8px 20px;
            font-size: 0.75rem;
            color: var(--muted);
            border-top: 1px solid rgba(255,255,255,0.1);
            flex-shrink: 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* ── Gyroscope Button ───────────────────────────── */
        #gyro-btn {
            background: var(--surface2);
            border: 1px solid rgba(255,255,255,0.2);
            color: var(--text);
            padding: 6px 12px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.75rem;
            display: none; /* Hidden by default, shown on mobile with gyro support */
            align-items: center;
            gap: 4px;
        }
        #gyro-btn:hover {
            border-color: var(--highlight);
        }
        #gyro-btn.active {
            background: var(--highlight);
            border-color: var(--highlight);
        }
        #gyro-btn .icon {
            font-size: 1rem;
        }

        /* ── Immersive Mode ───────────────────────────── */
        .tour-viewer.immersive header {
            display: none;
        }
        .tour-viewer.immersive aside {
            display: none;
        }
        .tour-viewer.immersive footer {
            opacity: 0;
            transition: opacity 0.3s;
        }
        .tour-viewer.immersive footer:hover {
            opacity: 1;
        }
        .tour-viewer.immersive #toggle-immersive-btn {
            background: rgba(0, 0, 0, 0.8);
        }
        .tour-viewer:not(.immersive) #toggle-immersive-btn {
            top: 70px;
        }

        /* ── Toggle Immersive Button ──────────────────── */
        #toggle-immersive-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s, transform 0.2s;
        }
        #toggle-immersive-btn:hover {
            background: rgba(0, 0, 0, 0.8);
            transform: scale(1.1);
        }

        /* ── Fullscreen Button ────────────────────────── */
        #fullscreen-btn {
            background: var(--surface2);
            border: 1px solid rgba(255,255,255,0.2);
            color: var(--text);
            padding: 6px 12px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.75rem;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        #fullscreen-btn:hover {
            border-color: var(--highlight);
        }
        #fullscreen-btn .icon {
            font-size: 1rem;
        }

        /* ── Responsive ─────────────────────────────── */
        @media (max-width: 768px) {
            main { flex-direction: column; }
            aside { width: 100%; max-height: 200px; border-left: none; border-top: 1px solid rgba(255,255,255,0.1); }
            header { flex-wrap: wrap; }
            .url-bar { flex-basis: 100%; }
        }
    </style>
</head>
<body class="tour-viewer">

<!-- Toggle Immersive Mode Button -->
<button id="toggle-immersive-btn" title="Toggle immersive mode (Esc)">☰</button>

<header>
    <div>
        <h1>🔭 Wikimedia Photosphere Tour</h1>
        <div class="subtitle">Phase 1 Prototype</div>
    </div>
    <div class="url-bar">
        <input type="text" id="tourInput"
               placeholder="Wiki page title, e.g. User:Fuzheado/Panellum_Tour"
               value="User:Fuzheado/Panellum_Tour">
        <button id="loadBtn">Load Tour</button>
    </div>
</header>

<main>
    <div id="panorama">
        <div style="display:flex;align-items:center;justify-content:center;height:100%;color:#888;">
            Enter a tour page title and click "Load Tour"
        </div>
    </div>
    <aside>
        <h2>📍 Scenes</h2>
        <ul class="scene-list" id="sceneList">
            <li style="color:var(--muted);">No tour loaded</li>
        </ul>
        <div class="tour-info" id="tourInfo" style="display:none;"></div>
        <div class="status" id="status">Ready</div>
    </aside>
</main>

<footer>
    <span>Powered by <a href="https://pannellum.org/" target="_blank" style="color:var(--highlight);">Pannellum</a></span>
    <div style="display:flex;gap:8px;align-items:center;">
        <button id="gyro-btn" title="Toggle device gyroscope control">
            <span class="icon">🧭</span>
            <span class="label">Gyro</span>
        </button>
        <button id="fullscreen-btn" title="Toggle fullscreen (F)">
            <span class="icon">⛶</span>
            <span class="label">Fullscreen</span>
        </button>
        <button id="toggleAllInfoBtn" style="background:var(--surface2);border:1px solid rgba(255,255,255,0.2);color:var(--text);padding:4px 12px;border-radius:5px;cursor:pointer;font-size:0.75rem;">👁 Show all popups</button>
        <a id="studio-btn" href="#" title="Open in Studio" style="background:var(--highlight);border:none;color:white;padding:4px 12px;border-radius:5px;cursor:pointer;font-size:0.75rem;text-decoration:none;display:inline-flex;align-items:center;gap:4px;">✏️ Studio</a>
    </div>
    <span>Tour JSON stored on <a href="https://commons.wikimedia.org/" target="_blank" style="color:var(--highlight);">Wikimedia Commons</a></span>
</footer>

<!-- Video overlay popup (placed before the JS script tag so getElementById works at parse time) -->
<div id="video-overlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:10000;align-items:center;justify-content:center;">
    <div id="video-overlay-content" style="position:relative;max-width:90vw;max-height:85vh;width:800px;">
        <button id="video-overlay-close" style="position:absolute;top:-40px;right:0;background:none;border:none;color:#fff;font-size:28px;cursor:pointer;z-index:10001;">×</button>
        <div id="video-overlay-player" style="position:relative;padding-bottom:56.25%;height:0;overflow:hidden;background:#000;border-radius:8px;">
        </div>
    </div>
</div>

<script>
// ── Configuration ───────────────────────────────────────────────────────────

// URL of the tour API backend
// In production, this is the Toolforge tool's API (e.g. https://wikipano.toolforge.org/api/tour)
const CONFIG_BACKEND = '/api/tour?page=';

// ── State ────────────────────────────────────────────────────────────────────

let viewer = null;
let tourData = null;
let currentScene = null;
let _urlModeParam = null; // Track if URL ?mode= was provided (set in setupImmersiveMode)

// ── Scene List ──────────────────────────────────────────────────────────────

function renderSceneList() {
    const list = document.getElementById('sceneList');
    if (!tourData || !tourData.scenes) {
        list.innerHTML = '<li style="color:var(--muted);">No scenes</li>';
        return;
    }

    list.innerHTML = Object.entries(tourData.scenes).map(([id, scene]) => {
        const active = id === currentScene ? ' class="active"' : '';
        // Use panorama path for thumbnail (browser scales via CSS background-size:cover)
        const pano = scene.panorama || '';
        const thumb = pano.startsWith('/images/') ? pano : '';
        const thumbSpan = thumb
            ? `<span class="thumb" style="background-image:url('${escapeHTML(thumb)}')"></span>`
            : `<span class="thumb"></span>`;
        return `<li${active} onclick="switchToScene('${escapeHTML(id)}')">
            ${thumbSpan}
            <span class="name">${escapeHTML(scene.title || id)}</span>
        </li>`;
    }).join('');
}

function renderTourInfo() {
    const info = document.getElementById('tourInfo');
    if (!tourData) {
        info.style.display = 'none';
        return;
    }
    info.style.display = 'block';
    const meta = tourData._meta || {};
    const author = (tourData.default && tourData.default.author) || 'Unknown';

    // Build wiki link based on source wiki
    const wikiHost = {
        commons: 'commons.wikimedia.org',
        en: 'en.wikipedia.org',
        de: 'de.wikipedia.org',
        fr: 'fr.wikipedia.org',
        es: 'es.wikipedia.org',
        it: 'it.wikipedia.org',
        ja: 'ja.wikipedia.org',
        zh: 'zh.wikipedia.org',
        ru: 'ru.wikipedia.org',
        pt: 'pt.wikipedia.org',
        wikidata: 'www.wikidata.org',
    }[meta.sourceWiki] || 'commons.wikimedia.org';
    const wikiName = meta.sourceWikiName || 'Commons';

    info.innerHTML = `
        <p><span class="label">Author:</span> ${escapeHTML(author)}</p>
        <p><span class="label">Scenes:</span> ${meta.totalScenes || Object.keys(tourData.scenes || {}).length}</p>
        <p><span class="label">Source:</span> <a href="https://${wikiHost}/wiki/${encodeURIComponent(meta.source || '')}" target="_blank" style="color:var(--highlight);">View on ${escapeHTML(wikiName)}</a></p>
    `;
}

function setStatus(message, type) {
    const el = document.getElementById('status');
    el.textContent = message;
    el.className = 'status ' + (type || '');
}

// ── Viewer ──────────────────────────────────────────────────────────────────

function loadTour(configUrl, targetScene) {
    setStatus('Loading tour...', 'loading');
    document.getElementById('tourInfo').style.display = 'none';

    // Destroy existing viewer if any
    if (viewer) {
        try { viewer.destroy(); } catch(e) {}
        viewer = null;
    }

    // Clear the panorama container
    document.getElementById('panorama').innerHTML = '';

    // Fetch tour config first, THEN initialize Pannellum once
    fetch(configUrl)
        .then(response => {
            if (!response.ok) {
                return response.json().then(err => {
                    throw new Error(err.error || 'HTTP ' + response.status);
                });
            }
            return response.json();
        })
        .then(config => {
            tourData = config;

            if (config.error) {
                throw new Error(config.error);
            }

            // Apply tour's viewMode if no URL ?mode= param was provided
            applyTourViewMode(config);

            // Add Wikipedia card tooltips to hotspots
            if (config.scenes) enrichHotspots(config.scenes);

            // Ensure autoLoad is set in default for tour mode
            if (config.default && config.default.autoLoad === undefined) {
                config.default.autoLoad = true;
            }

            const firstScene = config.default.firstScene;
            currentScene = firstScene;

            // Single initialization with full config
            viewer = pannellum.viewer('panorama', config);

            viewer.on('scenechange', function(sceneId) {
                currentScene = sceneId;
                renderSceneList();
                interceptAudioHotspots();
                interceptVideoHotspots();
                interceptInfoHotspots();
            });

            viewer.on('load', function() {
                interceptAudioHotspots();
                interceptVideoHotspots();
                interceptInfoHotspots();
                openHotspotsFromURL();
                setupGyroscopeButton();
                // Jump to a specific scene if ?scene=... was in the URL
                if (targetScene && tourData.scenes && tourData.scenes[targetScene]) {
                    try { viewer.loadScene(targetScene); } catch(e) { console.warn('Scene jump failed:', e); }
                }
                setStatus('Tour loaded successfully \u2713', 'ok');
            });

            viewer.on('error', function(err) {
                console.error('Pannellum error:', err);
                setStatus('Viewer error: ' + err, 'error');
            });

            renderSceneList();
            renderTourInfo();
        })
        .catch(err => {
            console.error('Tour load error:', err);
            setStatus('Error: ' + err.message, 'error');
            tourData = null;
            renderSceneList();
            renderTourInfo();
        });
}

function switchToScene(sceneId) {
    if (!viewer || !tourData) return;
    try {
        viewer.loadScene(sceneId);
        currentScene = sceneId;
        renderSceneList();
    } catch(e) {
        console.error('Scene switch error:', e);
    }
}

/**
 * Apply tour's default.viewMode if no URL ?mode= parameter was provided.
 * Priority: URL param > tour JSON > default (immersive)
 */
function applyTourViewMode(config) {
    // Skip if URL ?mode= was explicitly provided
    if (_urlModeParam) return;

    const viewMode = config?.default?.viewMode;
    if (!viewMode) return; // No viewMode in JSON, keep default (immersive)

    const body = document.body;
    if (viewMode === 'detailed') {
        body.classList.remove('immersive');
    } else if (viewMode === 'immersive') {
        body.classList.add('immersive');
    }

    // Update toggle button icon
    const toggleBtn = document.getElementById('toggle-immersive-btn');
    if (toggleBtn) {
        const isImmersive = body.classList.contains('immersive');
        toggleBtn.textContent = isImmersive ? '☰' : '×';
        toggleBtn.title = isImmersive ? 'Show sidebar (Esc)' : 'Hide sidebar (Esc)';
    }

    // Resize viewer to fit new layout
    if (viewer) {
        setTimeout(function() { viewer.updateSize(); }, 300);
    }
}

// ── Gyroscope Support ───────────────────────────────────────────────────

/**
 * Setup gyroscope toggle button for mobile devices.
 * Pannellum supports device orientation via startOrientation()/stopOrientation().
 * iOS 13+ requires a user gesture + permission prompt.
 */
function setupGyroscopeButton() {
    const gyroBtn = document.getElementById('gyro-btn');
    if (!gyroBtn || !viewer) return;

    // Check if device orientation is supported
    if (!viewer.isOrientationSupported()) {
        gyroBtn.style.display = 'none';
        return;
    }

    // Show the button on mobile devices
    const isMobile = 'ontouchstart' in window || navigator.maxTouchPoints > 0;
    if (!isMobile) {
        gyroBtn.style.display = 'none';
        return;
    }

    gyroBtn.style.display = 'flex';

    // Check if orientation is already active (from config orientationOnByDefault)
    if (viewer.isOrientationActive()) {
        gyroBtn.classList.add('active');
        gyroBtn.querySelector('.label').textContent = 'Gyro ON';
    }

    // Toggle gyroscope on button click
    gyroBtn.onclick = function() {
        if (!viewer) return;

        if (viewer.isOrientationActive()) {
            viewer.stopOrientation();
            gyroBtn.classList.remove('active');
            gyroBtn.querySelector('.label').textContent = 'Gyro';
            setStatus('Gyroscope disabled', 'ok');
        } else {
            // iOS 13+ requires permission request
            if (typeof DeviceOrientationEvent !== 'undefined' &&
                typeof DeviceOrientationEvent.requestPermission === 'function') {
                DeviceOrientationEvent.requestPermission()
                    .then(function(permission) {
                        if (permission === 'granted') {
                            viewer.startOrientation();
                            gyroBtn.classList.add('active');
                            gyroBtn.querySelector('.label').textContent = 'Gyro ON';
                            setStatus('Gyroscope enabled', 'ok');
                        } else {
                            setStatus('Gyroscope permission denied', 'error');
                        }
                    })
                    .catch(function(err) {
                        console.error('Gyroscope permission error:', err);
                        setStatus('Gyroscope permission error', 'error');
                    });
            } else {
                // Android and older iOS
                viewer.startOrientation();
                gyroBtn.classList.add('active');
                gyroBtn.querySelector('.label').textContent = 'Gyro ON';
                setStatus('Gyroscope enabled', 'ok');
            }
        }
    };
}

// ── Immersive Mode & Fullscreen ───────────────────────────────────────────

/**
 * Setup immersive mode toggle and fullscreen button.
 * Immersive mode hides header/sidebar for full-screen panorama viewing.
 *
 * Priority chain for determining initial mode:
 * 1. URL parameter ?mode=immersive|detailed (highest priority)
 * 2. Tour JSON default.viewMode (tour creator's intent)
 * 3. Default to 'immersive' if neither specified
 */
function setupImmersiveMode() {
    const body = document.body;
    const toggleBtn = document.getElementById('toggle-immersive-btn');
    const fullscreenBtn = document.getElementById('fullscreen-btn');

    // Check URL parameter first (highest priority)
    const urlParams = new URLSearchParams(window.location.search);
    const modeParam = urlParams.get('mode');
    _urlModeParam = modeParam; // Store for later use by applyTourViewMode
    if (modeParam === 'detailed') {
        body.classList.remove('immersive');
    } else if (modeParam === 'immersive') {
        body.classList.add('immersive');
    } else {
        // No URL param - default to immersive (tour JSON checked later)
        body.classList.add('immersive');
    }

    // Update button icon based on state
    function updateToggleIcon() {
        if (!toggleBtn) return;
        const isImmersive = body.classList.contains('immersive');
        toggleBtn.textContent = isImmersive ? '☰' : '×';
        toggleBtn.title = isImmersive ? 'Show sidebar (Esc)' : 'Hide sidebar (Esc)';
    }

    // Toggle immersive mode (session-only, no localStorage persistence)
    function toggleImmersive() {
        body.classList.toggle('immersive');
        updateToggleIcon();

        // Resize viewer to fit new layout
        if (viewer) {
            setTimeout(function() { viewer.updateSize(); }, 300);
        }
    }

    // Toggle fullscreen
    function toggleFullscreen() {
        if (!document.fullscreenElement && !document.webkitFullscreenElement) {
            // Enter fullscreen
            if (document.documentElement.requestFullscreen) {
                document.documentElement.requestFullscreen();
            } else if (document.documentElement.webkitRequestFullscreen) {
                document.documentElement.webkitRequestFullscreen();
            }
        } else {
            // Exit fullscreen
            if (document.exitFullscreen) {
                document.exitFullscreen();
            } else if (document.webkitExitFullscreen) {
                document.webkitExitFullscreen();
            }
        }
    }

    // Update fullscreen button icon
    function updateFullscreenIcon() {
        if (!fullscreenBtn) return;
        const isFullscreen = !!(document.fullscreenElement || document.webkitFullscreenElement);
        fullscreenBtn.querySelector('.icon').textContent = isFullscreen ? '⛶' : '⛶';
        fullscreenBtn.querySelector('.label').textContent = isFullscreen ? 'Exit' : 'Fullscreen';
    }

    // Button event listeners
    if (toggleBtn) {
        toggleBtn.addEventListener('click', toggleImmersive);
    }

    if (fullscreenBtn) {
        fullscreenBtn.addEventListener('click', toggleFullscreen);
    }

    // Fullscreen change events
    document.addEventListener('fullscreenchange', updateFullscreenIcon);
    document.addEventListener('webkitfullscreenchange', updateFullscreenIcon);

    // Keyboard shortcuts
    document.addEventListener('keydown', function(e) {
        // Don't trigger if user is typing in an input
        if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;

        switch(e.key) {
            case 'Escape':
                toggleImmersive();
                e.preventDefault();
                break;
            case 'f':
            case 'F':
                toggleFullscreen();
                e.preventDefault();
                break;
            case 'g':
            case 'G':
                // Trigger gyroscope button if visible
                const gyroBtn = document.getElementById('gyro-btn');
                if (gyroBtn && gyroBtn.style.display !== 'none') {
                    gyroBtn.click();
                }
                e.preventDefault();
                break;
        }
    });

    // On mobile, auto-enable gyro on first tap and make fullscreen prominent
    const isMobile = 'ontouchstart' in window || navigator.maxTouchPoints > 0;
    if (isMobile) {
        // Make fullscreen button more prominent
        if (fullscreenBtn) {
            fullscreenBtn.style.cssText = 'background:var(--highlight);border-color:var(--highlight);padding:10px 20px;font-size:0.9rem;font-weight:600;';
        }
        
        // Show a brief prompt
        const prompt = document.createElement('div');
        prompt.id = 'fullscreen-prompt';
        prompt.innerHTML = '👆 Tap to enable gyroscope & fullscreen';
        prompt.style.cssText = 'position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.8);color:white;padding:12px 24px;border-radius:25px;font-size:14px;z-index:1001;animation:fadeInOut 5s ease-in-out;pointer-events:none;white-space:nowrap;';
        document.body.appendChild(prompt);
        
        // Add CSS animation
        const style = document.createElement('style');
        style.textContent = '@keyframes fadeInOut { 0% { opacity: 0; } 10% { opacity: 1; } 70% { opacity: 1; } 100% { opacity: 0; } }';
        document.head.appendChild(style);
        
        // Remove prompt after 5 seconds
        setTimeout(() => prompt.remove(), 5000);
        
        // Auto-enable gyro on first tap (requires user gesture on iOS)
        let hasTapped = false;
        document.addEventListener('click', function enableGyro() {
            if (hasTapped) return;
            hasTapped = true;
            
            // Click gyro button if it exists and is visible
            const gyroBtn = document.getElementById('gyro-btn');
            if (gyroBtn && gyroBtn.style.display !== 'none') {
                gyroBtn.click();
            }
        }, { once: true });
    }

    // Initial icon update
    updateToggleIcon();
    updateFullscreenIcon();
}

// ── Audio Hotspot Support ───────────────────────────────────────────────────

const audioPlayer = document.createElement('audio');
audioPlayer.id = 'audioPlayer';
audioPlayer.style.display = 'none';
document.body.appendChild(audioPlayer);

/**
 * Intercept clicks on audio hotspots to play sound instead of navigating.
 * Called after viewer init and on every scene change (Pannellum re-creates hotspot DOM).
 */
// ── Audio hotspot onclick wrapping - one-shot per element ──────────────────

/** Resolve a Commons File: reference to a direct playable URL */
function resolveAudioFileUrl(fileRef, callback) {
    // Normalize Commons page URLs → extract filename, then resolve via server
    var match = fileRef.match(/(?:^File:|commons\.wikimedia\.org\/wiki\/File:)\s*(.+)$/i);
    if (!match) { callback(fileRef); return; }
    fetch('/api/resolve?file=' + encodeURIComponent(match[1].trim()))
        .then(function(r) { return r.json(); })
        .then(function(data) { callback(data.original || data.url); })
        .catch(function() { callback(fileRef); });
}

function wrapAudioHotspot(el) {
    if (el.dataset.audioWrapped) return;
    el.dataset.audioWrapped = '1';

    // Look up the audio URL from tourData by matching hotspot DOM order.
    var sceneId = currentScene;
    var scene = tourData && tourData.scenes && tourData.scenes[sceneId];
    var audioHots = [];
    if (scene && scene.hotSpots) {
        for (var i = 0; i < scene.hotSpots.length; i++) {
            if (scene.hotSpots[i].hotspotSubtype === 'audio' && scene.hotSpots[i].audioUrl) {
                audioHots.push(scene.hotSpots[i].audioUrl);
            }
        }
    }

    // Find this element's index among audio hotspot DOM elements
    var allAudio = document.querySelectorAll('.audio-hotspot');
    var domIdx = Array.prototype.indexOf.call(allAudio, el);
    var rawUrl = audioHots[domIdx] || null;

    // Pre-resolve Commons File: references to direct audio URLs.
    // The browser <audio> element can't play File: references - it needs a
    // direct URL like https://upload.wikimedia.org/.../file.ogg.
    // Resolution starts immediately when the hotspot appears; by the time
    // the user clicks, the resolved URL should be cached on the element.
    if (rawUrl) {
        resolveAudioFileUrl(rawUrl, function(resolved) {
            el.dataset.resolvedAudioUrl = resolved;
        });
    }

    el.onclick = function(e) {
        e.preventDefault();
        e.stopPropagation();
        // Use the pre-resolved URL if available, otherwise fall back to raw
        var audioUrl = el.dataset.resolvedAudioUrl || rawUrl;
        if (audioUrl) {
            if (audioPlayer.src === audioUrl && !audioPlayer.paused) {
                audioPlayer.pause();
                el.classList.remove('playing');
            } else {
                audioPlayer.src = audioUrl;
                audioPlayer.play().then(function() {
                    el.classList.add('playing');
                }).catch(function(err) {
                    console.warn('Audio playback failed:', err);
                });
            }
        }
        return false;
    };
}

/**
 * Intercept clicks on audio hotspots to play sound instead of navigating.
 * Uses a MutationObserver to catch hotspots as soon as Pannellum creates them,
 * since Pannellum may set onclick after the 'load' event.
 */
function interceptAudioHotspots() {
    var panorama = document.getElementById('panorama');
    if (!panorama) return;

    // Wrap any existing audio hotspots
    panorama.querySelectorAll('.audio-hotspot').forEach(wrapAudioHotspot);

    // Watch for new ones (scene changes, etc.)
    if (!panorama.dataset.audioObserver) {
        panorama.dataset.audioObserver = '1';
        var observer = new MutationObserver(function(mutations) {
            for (var m = 0; m < mutations.length; m++) {
                var addedNodes = mutations[m].addedNodes;
                for (var n = 0; n < addedNodes.length; n++) {
                    var node = addedNodes[n];
                    if (node.nodeType === 1) {
                        if (node.classList && node.classList.contains('audio-hotspot')) {
                            wrapAudioHotspot(node);
                        }
                        if (node.querySelectorAll) {
                            node.querySelectorAll('.audio-hotspot').forEach(wrapAudioHotspot);
                        }
                    }
                }
            }
        });
        observer.observe(panorama, { childList: true, subtree: true });
    }

    // Remove playing class when audio ends
    audioPlayer.onended = function() {
        document.querySelectorAll('.audio-hotspot.playing').forEach(function(el) {
            el.classList.remove('playing');
        });
    };
}

// ── Video Hotspot Support ───────────────────────────────────────────────────

const videoOverlay = document.getElementById('video-overlay');
const videoPlayer = document.getElementById('video-overlay-player');
const videoClose = document.getElementById('video-overlay-close');

/** Detect YouTube URL and return embed URL, or null if not YouTube */
function youtubeEmbedUrl(url) {
    var m = url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/)([a-zA-Z0-9_-]{11})/);
    return m ? 'https://www.youtube.com/embed/' + m[1] + '?autoplay=1' : null;
}

function showVideoOverlay(videoUrl) {
    videoPlayer.innerHTML = '';
    var ytEmbed = youtubeEmbedUrl(videoUrl);
    if (ytEmbed) {
        // YouTube: use iframe embed
        var iframe = document.createElement('iframe');
        iframe.src = ytEmbed;
        iframe.style.cssText = 'position:absolute;inset:0;width:100%;height:100%;border:0;';
        iframe.allow = 'autoplay; encrypted-media';
        iframe.allowFullscreen = true;
        videoPlayer.appendChild(iframe);
    } else {
        // Commons or direct video: use <video> tag
        var video = document.createElement('video');
        video.src = videoUrl;
        video.controls = true;
        video.autoplay = true;
        video.style.cssText = 'position:absolute;inset:0;width:100%;height:100%;';
        videoPlayer.appendChild(video);
    }
    videoOverlay.style.display = 'flex';
}

function hideVideoOverlay() {
    videoOverlay.style.display = 'none';
    videoPlayer.innerHTML = '';
}

// Close button, backdrop click, Escape key
videoClose.addEventListener('click', hideVideoOverlay);
videoOverlay.addEventListener('click', function(e) {
    if (e.target === videoOverlay) hideVideoOverlay();
});
document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape' && videoOverlay.style.display === 'flex') hideVideoOverlay();
});

function wrapVideoHotspot(el) {
    if (el.dataset.videoWrapped) return;
    el.dataset.videoWrapped = '1';

    var sceneId = currentScene;
    var scene = tourData && tourData.scenes && tourData.scenes[sceneId];
    var videoUrls = [];
    if (scene && scene.hotSpots) {
        for (var i = 0; i < scene.hotSpots.length; i++) {
            if (scene.hotSpots[i].hotspotSubtype === 'video' && scene.hotSpots[i].videoUrl) {
                videoUrls.push(scene.hotSpots[i].videoUrl);
            }
        }
    }

    var allVideo = document.querySelectorAll('.video-hotspot');
    var domIdx = Array.prototype.indexOf.call(allVideo, el);
    var rawUrl = videoUrls[domIdx] || null;

    // Pre-resolve Commons File: references (also handles Commons page URLs via server)
    if (rawUrl) {
        var fileMatch = rawUrl.match(/(?:^File:|commons\.wikimedia\.org\/wiki\/File:)\s*(.+)$/i);
        if (fileMatch) {
            fetch('/api/resolve?file=' + encodeURIComponent(fileMatch[1].trim()))
                .then(function(r) { return r.json(); })
                .then(function(data) { el.dataset.resolvedVideoUrl = data.original || data.url; })
                .catch(function() {});
        }
    }

    el.onclick = function(e) {
        e.preventDefault();
        e.stopPropagation();
        var playUrl = el.dataset.resolvedVideoUrl || rawUrl;
        if (playUrl) showVideoOverlay(playUrl);
        return false;
    };
}

function interceptVideoHotspots() {
    var panorama = document.getElementById('panorama');
    if (!panorama) return;
    panorama.querySelectorAll('.video-hotspot').forEach(wrapVideoHotspot);
    if (!panorama.dataset.videoObserver) {
        panorama.dataset.videoObserver = '1';
        var observer = new MutationObserver(function(mutations) {
            for (var m = 0; m < mutations.length; m++) {
                var addedNodes = mutations[m].addedNodes;
                for (var n = 0; n < addedNodes.length; n++) {
                    var node = addedNodes[n];
                    if (node.nodeType === 1) {
                        if (node.classList && node.classList.contains('video-hotspot')) {
                            wrapVideoHotspot(node);
                        }
                        if (node.querySelectorAll) {
                            node.querySelectorAll('.video-hotspot').forEach(wrapVideoHotspot);
                        }
                    }
                }
            }
        });
        observer.observe(panorama, { childList: true, subtree: true });
    }
}

// ── Wikipedia Rich Info Cards ────────────────────────────────────────────────

const WP_API = 'https://en.wikipedia.org/api/rest_v1/page/summary/';

function wikipediaCardTooltip(hotSpotDiv, args) {
    hotSpotDiv.classList.add('wp-card-hotspot');
    var card = document.createElement('div');
    card.className = 'wp-card-tooltip';
    card.innerHTML = '<button class="info-popup-close" title="Close">×</button><div class="wp-card-loading">Loading...</div>';
    hotSpotDiv.appendChild(card);

    // Close button handler: preventDefault + stopPropagation to block both
    // the parent <a> navigation and the hotspot toggle
    function bindCloseBtn(btn) {
        btn.onclick = function(e) {
            e.preventDefault();
            e.stopPropagation();
            card.classList.remove('visible');
        };
    }
    bindCloseBtn(card.querySelector('.info-popup-close'));

    // Fetch article summary from Wikipedia API
    var title = args.title;
    fetch(WP_API + encodeURIComponent(title))
        .then(function(r) { return r.json(); })
        .then(function(data) {
            var img = data.thumbnail ?
                '<img src="' + data.thumbnail.source + '" style="width:' + (data.thumbnail.width || 200) + 'px;max-width:200px;border-radius:6px 6px 0 0;" />' : '';
            var extract = data.extract || '';
            if (extract.length > 300) extract = extract.substring(0, 300) + '...';
            card.innerHTML = '<button class="info-popup-close" title="Close">×</button>' + img +
                '<div class="wp-card-body">' +
                '<h3>' + escapeHTML(data.title || title) + '</h3>' +
                '<p>' + escapeHTML(extract) + '</p>' +
                '<a href="' + (data.content_urls?.desktop?.page || args.url) + '" target="_blank" class="wp-card-link">Read on Wikipedia →</a>' +
                '</div>';
            bindCloseBtn(card.querySelector('.info-popup-close'));
        })
        .catch(function() {
            card.innerHTML = '<button class="info-popup-close" title="Close">×</button><div class="wp-card-body">' +
                '<h3>' + escapeHTML(title.replace(/_/g, ' ')) + '</h3>' +
                '<a href="' + args.url + '" target="_blank" class="wp-card-link">View on Wikipedia →</a>' +
                '</div>';
            bindCloseBtn(card.querySelector('.info-popup-close'));
        });
}

function enrichHotspots(scenes) {
    for (var sceneId in scenes) {
        var scene = scenes[sceneId];
        if (!scene.hotSpots) continue;
        for (var i = 0; i < scene.hotSpots.length; i++) {
            var hs = scene.hotSpots[i];
            // Tag ALL hotspot types via createTooltipFunc - Pannellum 2.5.7 applies
            // cssClass to different divs depending on type, but createTooltipFunc
            // consistently receives the base div where our CSS classes need to live.
            var tagClass = null;
            if (hs.type === 'scene') {
                tagClass = 'scene-hotspot';
            } else if (hs.hotspotSubtype === 'audio') {
                tagClass = 'audio-hotspot';
            } else if (hs.hotspotSubtype === 'video') {
                tagClass = 'video-hotspot';
            } else if (hs.URL && isWikipediaUrl(hs.URL)) {
                // Wikipedia cards: use wp-card-hotspot class for consistent styling
                tagClass = 'wp-card-hotspot';
                var title = extractWikipediaTitle(hs.URL);
                if (title) {
                    hs.createTooltipFunc = wikipediaCardTooltip;
                    hs.createTooltipArgs = { title: title, url: hs.URL };
                }
            } else if (hs.type === 'info') {
                tagClass = 'info-hotspot';
            }

            // Add icon size class if specified
            var sizeClass = '';
            if (hs.iconStyle && hs.iconStyle !== 'normal') {
                sizeClass = ' icon-' + hs.iconStyle;
            }

            // Set cssClass for all types now - we use custom CSS with ::after for icons
            // instead of relying on Pannellum's default sprites.
            if (tagClass) {
                hs.cssClass = (hs.cssClass ? hs.cssClass + ' ' : '') + tagClass + sizeClass;
            }

            // Also stamp the tag class via createTooltipFunc for types that need
            // special behavior (Wikipedia cards, etc.)
            if (tagClass && !hs.createTooltipFunc) {
                hs.createTooltipFunc = (function(cls) {
                    return function(div) { div.classList.add(cls); };
                })(tagClass);
                hs.createTooltipArgs = {};
            }
        }
    }
    return scenes;
}

// ── Info Click-to-Toggle ────────────────────────────────────────────────────

function _doInterceptInfo(panorama) {
    panorama.querySelectorAll('.info-hotspot, .wp-card-hotspot').forEach(function(el) {
        if (el.dataset.infoIntercepted) return;
        el.dataset.infoIntercepted = '1';
        el.onmouseenter = null;
        el.onmouseleave = null;

        // Pannellum wraps hotspots in <a target="_blank"> when they have a URL.
        // Intercept clicks on the <a> parent so that clicks inside the tooltip card
        // (close button, images, text) don't trigger navigation - but actual links
        // inside the card (e.g. "Read on Wikipedia") should still work.
        var anchorParent = el.closest('a');
        if (anchorParent) {
            anchorParent.addEventListener('click', function(e) {
                if (e.target.closest('.wp-card-tooltip')) {
                    // Allow clicks on actual links inside the card to navigate
                    if (e.target.closest('a[href]')) return;
                    // Block everything else (close button, images, text)
                    e.preventDefault();
                    return false;
                }
            }, true); // capture phase - fires before the <a> default action
        }

        el.onclick = function(e) {
            // Don't intercept clicks on links inside the card (e.g. "Read on Wikipedia")
            if (e.target.closest('.wp-card-tooltip a[href]')) return;
            e.preventDefault(); e.stopPropagation();
            var card = this.querySelector('.wp-card-tooltip');
            if (card) { card.classList.toggle('visible'); }
            else {
                var t = this.querySelector('.pnlm-tooltip');
                if (t) t.style.setProperty('display', t.style.display==='block'?'none':'block','important');
            }
            return false;
        };
    });
    if (!panorama.dataset.infoObserver) {
        panorama.dataset.infoObserver = '1';
        new MutationObserver(function(){ _doInterceptInfo(panorama); }).observe(panorama, {childList:true,subtree:true});
    }
}

function interceptInfoHotspots() {
    var p = document.getElementById('panorama');
    if (p) _doInterceptInfo(p);
    // Pannellum 2.5.7 scene hotspot sprites in .pnlm-render-container default
    // to visibility:hidden and Pannellum may re-hide them. Force visible after
    // a short delay to let Pannellum finish its own visibility updates.
    setTimeout(function() {
        document.querySelectorAll('.pnlm-render-container .pnlm-scene').forEach(function(el) {
            el.style.visibility = 'visible';
        });
    }, 200);
}

// ── Show/Hide All ──────────────────────────────────────────────────────────

var _showingAllInfo = false;
var toggleAllInfoBtn = document.getElementById('toggleAllInfoBtn');
if (toggleAllInfoBtn) {
    toggleAllInfoBtn.addEventListener('click', function() {
        _showingAllInfo = !_showingAllInfo;
        var cards = document.querySelectorAll('.wp-card-tooltip');
        var tips = document.querySelectorAll('.pnlm-hotspot-base .pnlm-tooltip');
        if (_showingAllInfo) {
            toggleAllInfoBtn.textContent = '🙈 Hide all popups';
            cards.forEach(function(c){ c.classList.add('visible'); });
            tips.forEach(function(t){ t.style.setProperty('display','block','important'); });
        } else {
            toggleAllInfoBtn.textContent = '👁 Show all popups';
            cards.forEach(function(c){ c.classList.remove('visible'); });
            tips.forEach(function(t){ t.style.setProperty('display','none','important'); });
        }
    });
}

// ── Open Hotspots from URL ─────────────────────────────────────────────────

var _openedFromURL = false;
function openHotspotsFromURL() {
    if (_openedFromURL) return;
    _openedFromURL = true;
    var params = new URLSearchParams(window.location.hash.slice(1));
    var openParam = params.get('open');
    if (!openParam) return;
    var indices = openParam.split(',').map(function(s){return parseInt(s.trim(),10);}).filter(function(n){return !isNaN(n);});
    var all = document.querySelectorAll('#panorama .pnlm-hotspot-base');
    indices.forEach(function(idx){
        if (idx >= 0 && idx < all.length) {
            var el = all[idx];
            if (!el.classList.contains('scene-hotspot') && !el.classList.contains('audio-hotspot') && !el.classList.contains('video-hotspot')) {
                el.click();
            }
        }
    });
}

function isWikipediaUrl(url) {
    return /\.wikipedia\.org\/wiki\//i.test(url) ||
           /qrwp\.org\//i.test(url) ||
           /en\.wikipedia\.org/i.test(url);
}

function extractWikipediaTitle(url) {
    // Match /wiki/Page_Title or /Page_Title from qrwp.org
    var m = url.match(/\/wiki\/([^?#]+)/i);
    if (m) return decodeURIComponent(m[1]);
    // Match qrwp.org/Page_Title format
    m = url.match(/qrwp\.org\/([^?#]+)/i);
    if (m) return decodeURIComponent(m[1]);
    return null;
}

function loadPreviewConfig(config) {
    // Clear the placeholder text from the panorama container
    document.getElementById('panorama').innerHTML = '';

    // Apply tour's viewMode if no URL ?mode= param was provided
    applyTourViewMode(config);

    // Add Wikipedia card tooltips to hotspots
    if (config.scenes) enrichHotspots(config.scenes);

    tourData = config;
    if (config.default && config.default.autoLoad === undefined) {
        config.default.autoLoad = true;
    }
    const firstScene = config.default.firstScene;
    currentScene = firstScene;
    viewer = pannellum.viewer('panorama', config);
    viewer.on('scenechange', function(sceneId) {
        currentScene = sceneId;
        renderSceneList();
        interceptAudioHotspots();
                interceptVideoHotspots();
                interceptInfoHotspots();
    });
    viewer.on('load', function() {
        interceptAudioHotspots();
                interceptVideoHotspots();
                interceptInfoHotspots();
        setStatus('Preview loaded \u2713', 'ok');
    });
    viewer.on('error', function(err) {
        console.error('Pannellum error:', err);
        setStatus('Viewer error: ' + err, 'error');
    });
    renderSceneList();
    renderTourInfo();
    document.getElementById('tourInput').value = '[Studio Preview]';
    const info = document.getElementById('tourInfo');
    info.style.display = 'block';
    info.innerHTML = '<p><span class="label">Source:</span> Studio Preview</p>' +
        '<p><span class="label">Scenes:</span> ' + Object.keys(config.scenes || {}).length + '</p>';
}

// ── UI Handlers ─────────────────────────────────────────────────────────────

function handleLoad(targetScene) {
    const input = document.getElementById('tourInput');
    const tourPage = input.value.trim();
    if (!tourPage) {
        setStatus('Please enter a wiki page title', 'error');
        return;
    }

    // Update URL to reflect the loaded tour (shareable link)
    updateURLForTour(tourPage, targetScene);

    const configUrl = CONFIG_BACKEND + encodeURIComponent(tourPage);
    loadTour(configUrl, targetScene);
}

/**
 * Update the browser URL to reflect the current tour.
 * Preserves existing ?mode= parameter if present.
 */
function updateURLForTour(tourPage, targetScene) {
    const url = new URL(window.location);
    url.searchParams.set('page', tourPage);
    if (targetScene) {
        url.searchParams.set('scene', targetScene);
    } else {
        url.searchParams.delete('scene');
    }
    // Preserve ?mode= if present
    history.pushState({ tourPage, targetScene }, '', url);
}

function handleKeyPress(e) {
    if (e.key === 'Enter') {
        handleLoad();
    }
}

// ── Utility ─────────────────────────────────────────────────────────────────

function escapeHTML(str) {
    if (!str) return '';
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
}

// ── Init ────────────────────────────────────────────────────────────────────

document.addEventListener('DOMContentLoaded', function() {
    // Setup immersive mode and fullscreen FIRST (before any early returns)
    setupImmersiveMode();

    document.getElementById('loadBtn').addEventListener('click', handleLoad);
    document.getElementById('tourInput').addEventListener('keypress', handleKeyPress);

    // Check for query string params (?page=...&scene=...)
    const urlParams = new URLSearchParams(window.location.search);
    const pageParam = urlParams.get('page');
    const sceneParam = urlParams.get('scene');

    if (pageParam) {
        // Query string mode - same params as studio
        document.getElementById('tourInput').value = pageParam;
        // Set Studio button URL
        document.getElementById('studio-btn').href = '/studio?page=' + encodeURIComponent(pageParam);
        handleLoad(sceneParam);
        return;
    }

    // Auto-load from URL hash
    const hash = window.location.hash.slice(1);
    if (hash) {
        // localStorage preview (from studio - persistent, cross-tab)
        if (hash === 'preview=local' || hash === 'preview=session') {
            try {
                const stored = localStorage.getItem('photosphere-preview-tour') || sessionStorage.getItem('photosphere-preview-tour');
                if (!stored) throw new Error('No preview data found. Go back to the studio and click Preview again.');
                const config = JSON.parse(stored);
                loadPreviewConfig(config);
            } catch(e) {
                console.error('Preview error:', e);
                setStatus('Preview error: ' + e.message, 'error');
            }
            return;
        }
        // Server-side preview: short key
        if (hash.startsWith('preview=')) {
            const key = hash.slice(8);
            setStatus('Loading preview...', 'loading');
            fetch(`/api/preview/${key}`)
                .then(r => {
                    if (!r.ok) throw new Error('Preview not found');
                    return r.json();
                })
                .then(config => {
                    tourData = config;
                    if (config.scenes) enrichHotspots(config.scenes);
                    if (config.default && config.default.autoLoad === undefined) {
                        config.default.autoLoad = true;
                    }
                    currentScene = config.default.firstScene;
                    viewer = pannellum.viewer('panorama', config);
                    viewer.on('scenechange', function(sceneId) {
                        currentScene = sceneId;
                        renderSceneList();
                        interceptAudioHotspots();
                interceptVideoHotspots();
                interceptInfoHotspots();
                    });
                    viewer.on('load', function() {
                        interceptAudioHotspots();
                interceptVideoHotspots();
                interceptInfoHotspots();
                        setStatus('Preview loaded \u2713', 'ok');
                    });
                    viewer.on('error', function(err) {
                        setStatus('Viewer error: ' + err, 'error');
                    });
                    renderSceneList();
                    renderTourInfo();
                    document.getElementById('tourInput').value = '[Studio Preview]';
                    const info = document.getElementById('tourInfo');
                    info.style.display = 'block';
                    info.innerHTML = '<p><span class="label">Source:</span> Studio Preview</p>' +
                        '<p><span class="label">Scenes:</span> ' + Object.keys(config.scenes || {}).length + '</p>';
                })
                .catch(e => {
                    setStatus('Error: ' + e.message, 'error');
                });
            return;
        }
        // Studio preview: inline JSON data (legacy)
        if (hash.startsWith('data=')) {
            try {
                const json = decodeURIComponent(hash.slice(5));
                const config = JSON.parse(json);
                loadPreviewConfig(config);
                return;
            } catch(e) {
                console.error('Failed to parse inline tour data:', e);
                setStatus('Error: Invalid preview data', 'error');
            }
        }
        // Standard wiki page title
        document.getElementById('tourInput').value = hash;
        // Set Studio button URL
        document.getElementById('studio-btn').href = '/studio?page=' + encodeURIComponent(hash);
        handleLoad(sceneParam);
    } else {
        // Auto-load the example tour on page load
        handleLoad();
    }
});
</script>
