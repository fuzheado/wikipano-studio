<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wikimedia Photosphere Tour Viewer — Phase 1 Prototype</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum@2.5.7/build/pannellum.css"/>
    <script src="https://cdn.jsdelivr.net/npm/pannellum@2.5.7/build/pannellum.js"></script>
    <style>
        :root {
            --bg: #1a1a2e;
            --surface: #16213e;
            --text: #e0e0e0;
            --accent: #0f3460;
            --highlight: #e94560;
            --muted: #888;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ── Header ─────────────────────────────────── */
        header {
            background: var(--surface);
            padding: 12px 20px;
            display: flex;
            align-items: center;
            gap: 16px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            flex-shrink: 0;
        }
        header h1 {
            font-size: 1.1rem;
            font-weight: 600;
            white-space: nowrap;
        }
        header .subtitle {
            font-size: 0.8rem;
            color: var(--muted);
        }

        /* ── URL bar ────────────────────────────────── */
        .url-bar {
            display: flex;
            gap: 8px;
            flex: 1;
            min-width: 0;
        }
        .url-bar input {
            flex: 1;
            padding: 8px 12px;
            background: var(--bg);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 6px;
            color: var(--text);
            font-size: 0.9rem;
            min-width: 0;
        }
        .url-bar input:focus {
            outline: none;
            border-color: var(--highlight);
        }
        .url-bar button {
            padding: 8px 16px;
            background: var(--highlight);
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 600;
            white-space: nowrap;
        }
        .url-bar button:hover {
            filter: brightness(1.1);
        }

        /* ── Main layout ────────────────────────────── */
        main {
            flex: 1;
            display: flex;
            min-height: 0;
        }

        /* ── Viewer ─────────────────────────────────── */
        #panorama {
            flex: 1;
            min-width: 0;
            background: #000;
        }
        #panorama .pnlm-container {
            /* Pannellum creates its own container */
        }

        /* ── Sidebar ────────────────────────────────── */
        aside {
            width: 320px;
            background: var(--surface);
            border-left: 1px solid rgba(255,255,255,0.1);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            flex-shrink: 0;
        }
        aside h2 {
            padding: 16px 20px 8px;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--muted);
        }

        /* Scene list */
        .scene-list {
            list-style: none;
        }
        .scene-list li {
            padding: 10px 20px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.9rem;
            transition: background 0.15s;
        }
        .scene-list li:hover {
            background: rgba(255,255,255,0.05);
        }
        .scene-list li.active {
            background: var(--accent);
            font-weight: 600;
        }
        .scene-list li .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--highlight);
            flex-shrink: 0;
        }

        /* Tour info */
        .tour-info {
            padding: 16px 20px;
            font-size: 0.8rem;
            color: var(--muted);
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .tour-info .label {
            font-weight: 600;
            color: var(--text);
        }

        /* Status bar */
        .status {
            padding: 10px 20px;
            font-size: 0.8rem;
            background: var(--bg);
            border-top: 1px solid rgba(255,255,255,0.1);
            min-height: 40px;
            display: flex;
            align-items: center;
        }
        .status.error { color: var(--highlight); }
        .status.loading { color: #f0ad4e; }
        .status.ok { color: #5cb85c; }

        /* Wikipedia card tooltips */
        .wp-card-tooltip {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            background: #1a1a2e;
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 8px;
            width: 260px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.6);
            overflow: hidden;
            pointer-events: auto;
            font-size: 0.82rem;
            line-height: 1.4;
            z-index: 100;
        }
        .wp-card-tooltip img {
            width: 100%;
            max-height: 140px;
            object-fit: cover;
        }
        .wp-card-body {
            padding: 12px 14px;
        }
        .wp-card-body h3 {
            margin: 0 0 6px 0;
            font-size: 0.95rem;
            color: #fff;
        }
        .wp-card-body p {
            margin: 0 0 10px 0;
            color: #aaa;
            font-size: 0.78rem;
        }
        .wp-card-link {
            color: #5bc0de;
            text-decoration: none;
            font-size: 0.78rem;
        }
        .wp-card-link:hover { text-decoration: underline; }
        .wp-card-loading {
            padding: 20px;
            text-align: center;
            color: #888;
            font-size: 0.8rem;
        }
        .wp-card-hotspot .pnlm-tooltip {
            display: none !important;
        }

        /* Wikipedia cards hidden by default — shown on click */
        .wp-card-tooltip { display: none; }
        .wp-card-tooltip.visible { display: block; }

        /* Close button for info popups */
        .info-popup-close {
            position: absolute; top: 6px; right: 8px;
            background: rgba(0,0,0,0.5); border: none; color: #fff;
            font-size: 16px; cursor: pointer; width: 24px; height: 24px;
            border-radius: 50%; display: flex; align-items: center;
            justify-content: center; z-index: 101; line-height: 1;
        }
        .info-popup-close:hover { background: rgba(233,69,96,0.8); }

        /* Audio hotspot: styled like the studio's green 🎵 icon */
        .audio-hotspot {
            height: 44px !important;
            width: 44px !important;
            background: #2d6a4f !important;
            border-radius: 50% !important;
            border: 3px solid #fff !important;
            box-shadow: 0 0 18px rgba(45, 106, 79, 0.8), 0 0 40px rgba(45, 106, 79, 0.3) !important;
            animation: audio-wave-viewer 1.2s ease-in-out infinite;
            transition: box-shadow 0.3s !important;
        }
        .audio-hotspot::after {
            content: '🎵';
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            color: #fff;
            line-height: 1;
            z-index: 999;
        }
        .audio-hotspot.pnlm-sprite {
            background-image: none !important;
        }
        @keyframes audio-wave-viewer {
            0%, 100% { box-shadow: 0 0 18px rgba(45, 106, 79, 0.8), 0 0 40px rgba(45, 106, 79, 0.3); }
            50% { box-shadow: 0 0 32px rgba(45, 106, 79, 1), 0 0 70px rgba(45, 106, 79, 0.6); }
        }

        /* Audio hotspot: extra glow when actively playing */
        .audio-hotspot.playing {
            box-shadow: 0 0 28px rgba(100, 200, 150, 1), 0 0 60px rgba(100, 200, 150, 0.6) !important;
            animation: audio-play-pulse 0.8s ease-in-out infinite;
        }
        @keyframes audio-play-pulse {
            0%, 100% { box-shadow: 0 0 28px rgba(100, 200, 150, 1), 0 0 60px rgba(100, 200, 150, 0.6); }
            50% { box-shadow: 0 0 44px rgba(100, 200, 150, 1), 0 0 90px rgba(100, 200, 150, 0.8); }
        }

        /* Video hotspot: purple play button */
        .video-hotspot {
            height: 48px !important;
            width: 48px !important;
            background: #7c3aed !important;
            border-radius: 50% !important;
            border: 3px solid #fff !important;
            box-shadow: 0 0 18px rgba(124, 58, 237, 0.8), 0 0 40px rgba(124, 58, 237, 0.3) !important;
            animation: video-glow-v 1.5s ease-in-out infinite;
        }
        .video-hotspot::after {
            content: '▶️';
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            color: #fff;
            line-height: 1;
            z-index: 999;
        }
        .video-hotspot.pnlm-sprite {
            background-image: none !important;
        }
        @keyframes video-glow-v {
            0%, 100% { box-shadow: 0 0 18px rgba(124, 58, 237, 0.8), 0 0 40px rgba(124, 58, 237, 0.3); }
            50% { box-shadow: 0 0 32px rgba(124, 58, 237, 1), 0 0 70px rgba(124, 58, 237, 0.6); }
        }

        /* ── Footer ─────────────────────────────────── */
        footer {
            background: var(--surface);
            padding: 8px 20px;
            font-size: 0.75rem;
            color: var(--muted);
            border-top: 1px solid rgba(255,255,255,0.1);
            flex-shrink: 0;
            display: flex;
            justify-content: space-between;
        }

        /* ── Responsive ─────────────────────────────── */
        @media (max-width: 768px) {
            main { flex-direction: column; }
            aside { width: 100%; max-height: 200px; border-left: none; border-top: 1px solid rgba(255,255,255,0.1); }
            header { flex-wrap: wrap; }
            .url-bar { flex-basis: 100%; }
        }
    </style>
</head>
<body>

<header>
    <div>
        <h1>🔭 Wikimedia Photosphere Tour</h1>
        <div class="subtitle">Phase 1 Prototype</div>
    </div>
    <div class="url-bar">
        <input type="text" id="tourInput"
               placeholder="Wiki page title, e.g. User:Fuzheado/Panellum_Tour"
               value="User:Fuzheado/Panellum_Tour">
        <button id="loadBtn">Load Tour</button>
    </div>
</header>

<main>
    <div id="panorama">
        <div style="display:flex;align-items:center;justify-content:center;height:100%;color:#888;">
            Enter a tour page title and click "Load Tour"
        </div>
    </div>
    <aside>
        <h2>📍 Scenes</h2>
        <ul class="scene-list" id="sceneList">
            <li style="color:var(--muted);">No tour loaded</li>
        </ul>
        <div class="tour-info" id="tourInfo" style="display:none;"></div>
        <div class="status" id="status">Ready</div>
    </aside>
</main>

<footer>
    <span>Powered by <a href="https://pannellum.org/" target="_blank" style="color:var(--highlight);">Pannellum</a></span>
    <button id="toggleAllInfoBtn" style="background:var(--surface2);border:1px solid rgba(255,255,255,0.2);color:var(--text);padding:4px 12px;border-radius:5px;cursor:pointer;font-size:0.75rem;">👁 Show all popups</button>
    <span>Tour JSON stored on <a href="https://commons.wikimedia.org/" target="_blank" style="color:var(--highlight);">Wikimedia Commons</a></span>
</footer>

<!-- Video overlay popup (placed before the JS script tag so getElementById works at parse time) -->
<div id="video-overlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:10000;align-items:center;justify-content:center;">
    <div id="video-overlay-content" style="position:relative;max-width:90vw;max-height:85vh;width:800px;">
        <button id="video-overlay-close" style="position:absolute;top:-40px;right:0;background:none;border:none;color:#fff;font-size:28px;cursor:pointer;z-index:10001;">×</button>
        <div id="video-overlay-player" style="position:relative;padding-bottom:56.25%;height:0;overflow:hidden;background:#000;border-radius:8px;">
        </div>
    </div>
</div>

<script>
// ── Configuration ───────────────────────────────────────────────────────────

// URL of the tour API backend
// In production, this is the Toolforge tool's API (e.g. https://wikipano.toolforge.org/api/tour)
const CONFIG_BACKEND = '/api/tour?page=';

// ── State ────────────────────────────────────────────────────────────────────

let viewer = null;
let tourData = null;
let currentScene = null;

// ── Scene List ──────────────────────────────────────────────────────────────

function renderSceneList() {
    const list = document.getElementById('sceneList');
    if (!tourData || !tourData.scenes) {
        list.innerHTML = '<li style="color:var(--muted);">No scenes</li>';
        return;
    }

    list.innerHTML = Object.entries(tourData.scenes).map(([id, scene]) => {
        const active = id === currentScene ? ' class="active"' : '';
        return `<li${active} onclick="switchToScene('${escapeHTML(id)}')">
            <span class="dot"></span>
            ${escapeHTML(scene.title || id)}
        </li>`;
    }).join('');
}

function renderTourInfo() {
    const info = document.getElementById('tourInfo');
    if (!tourData) {
        info.style.display = 'none';
        return;
    }
    info.style.display = 'block';
    const meta = tourData._meta || {};
    const author = (tourData.default && tourData.default.author) || 'Unknown';
    info.innerHTML = `
        <p><span class="label">Author:</span> ${escapeHTML(author)}</p>
        <p><span class="label">Scenes:</span> ${meta.totalScenes || Object.keys(tourData.scenes || {}).length}</p>
        <p><span class="label">Source:</span> <a href="https://commons.wikimedia.org/wiki/${encodeURIComponent(meta.source || '')}" target="_blank" style="color:var(--highlight);">View on Commons</a></p>
    `;
}

function setStatus(message, type) {
    const el = document.getElementById('status');
    el.textContent = message;
    el.className = 'status ' + (type || '');
}

// ── Viewer ──────────────────────────────────────────────────────────────────

function loadTour(configUrl) {
    setStatus('Loading tour...', 'loading');
    document.getElementById('tourInfo').style.display = 'none';

    // Destroy existing viewer if any
    if (viewer) {
        try { viewer.destroy(); } catch(e) {}
        viewer = null;
    }

    // Clear the panorama container
    document.getElementById('panorama').innerHTML = '';

    // Fetch tour config first, THEN initialize Pannellum once
    fetch(configUrl)
        .then(response => {
            if (!response.ok) {
                return response.json().then(err => {
                    throw new Error(err.error || 'HTTP ' + response.status);
                });
            }
            return response.json();
        })
        .then(config => {
            tourData = config;

            if (config.error) {
                throw new Error(config.error);
            }

            // Add Wikipedia card tooltips to hotspots
            if (config.scenes) enrichHotspots(config.scenes);

            // Ensure autoLoad is set in default for tour mode
            if (config.default && config.default.autoLoad === undefined) {
                config.default.autoLoad = true;
            }

            const firstScene = config.default.firstScene;
            currentScene = firstScene;

            // Single initialization with full config
            viewer = pannellum.viewer('panorama', config);

            viewer.on('scenechange', function(sceneId) {
                currentScene = sceneId;
                renderSceneList();
                interceptAudioHotspots();
                interceptVideoHotspots();
                interceptInfoHotspots();
            });

            viewer.on('load', function() {
                interceptAudioHotspots();
                interceptVideoHotspots();
                interceptInfoHotspots();
                openHotspotsFromURL();
                setStatus('Tour loaded successfully \u2713', 'ok');
            });

            viewer.on('error', function(err) {
                console.error('Pannellum error:', err);
                setStatus('Viewer error: ' + err, 'error');
            });

            renderSceneList();
            renderTourInfo();
        })
        .catch(err => {
            console.error('Tour load error:', err);
            setStatus('Error: ' + err.message, 'error');
            tourData = null;
            renderSceneList();
            renderTourInfo();
        });
}

function switchToScene(sceneId) {
    if (!viewer || !tourData) return;
    try {
        viewer.loadScene(sceneId);
        currentScene = sceneId;
        renderSceneList();
    } catch(e) {
        console.error('Scene switch error:', e);
    }
}

// ── Audio Hotspot Support ───────────────────────────────────────────────────

const audioPlayer = document.createElement('audio');
audioPlayer.id = 'audioPlayer';
audioPlayer.style.display = 'none';
document.body.appendChild(audioPlayer);

/**
 * Intercept clicks on audio hotspots to play sound instead of navigating.
 * Called after viewer init and on every scene change (Pannellum re-creates hotspot DOM).
 */
// ── Audio hotspot onclick wrapping — one-shot per element ──────────────────

/** Resolve a Commons File: reference to a direct playable URL */
function resolveAudioFileUrl(fileRef, callback) {
    // Normalize Commons page URLs → extract filename, then resolve via server
    var match = fileRef.match(/(?:^File:|commons\.wikimedia\.org\/wiki\/File:)\s*(.+)$/i);
    if (!match) { callback(fileRef); return; }
    fetch('/api/resolve?file=' + encodeURIComponent(match[1].trim()))
        .then(function(r) { return r.json(); })
        .then(function(data) { callback(data.original || data.url); })
        .catch(function() { callback(fileRef); });
}

function wrapAudioHotspot(el) {
    if (el.dataset.audioWrapped) return;
    el.dataset.audioWrapped = '1';

    // Look up the audio URL from tourData by matching hotspot DOM order.
    var sceneId = currentScene;
    var scene = tourData && tourData.scenes && tourData.scenes[sceneId];
    var audioHots = [];
    if (scene && scene.hotSpots) {
        for (var i = 0; i < scene.hotSpots.length; i++) {
            if (scene.hotSpots[i].hotspotSubtype === 'audio' && scene.hotSpots[i].audioUrl) {
                audioHots.push(scene.hotSpots[i].audioUrl);
            }
        }
    }

    // Find this element's index among audio hotspot DOM elements
    var allAudio = document.querySelectorAll('.audio-hotspot');
    var domIdx = Array.prototype.indexOf.call(allAudio, el);
    var rawUrl = audioHots[domIdx] || null;

    // Pre-resolve Commons File: references to direct audio URLs.
    // The browser <audio> element can't play File: references — it needs a
    // direct URL like https://upload.wikimedia.org/.../file.ogg.
    // Resolution starts immediately when the hotspot appears; by the time
    // the user clicks, the resolved URL should be cached on the element.
    if (rawUrl) {
        resolveAudioFileUrl(rawUrl, function(resolved) {
            el.dataset.resolvedAudioUrl = resolved;
        });
    }

    el.onclick = function(e) {
        e.preventDefault();
        e.stopPropagation();
        // Use the pre-resolved URL if available, otherwise fall back to raw
        var audioUrl = el.dataset.resolvedAudioUrl || rawUrl;
        if (audioUrl) {
            if (audioPlayer.src === audioUrl && !audioPlayer.paused) {
                audioPlayer.pause();
                el.classList.remove('playing');
            } else {
                audioPlayer.src = audioUrl;
                audioPlayer.play().then(function() {
                    el.classList.add('playing');
                }).catch(function(err) {
                    console.warn('Audio playback failed:', err);
                });
            }
        }
        return false;
    };
}

/**
 * Intercept clicks on audio hotspots to play sound instead of navigating.
 * Uses a MutationObserver to catch hotspots as soon as Pannellum creates them,
 * since Pannellum may set onclick after the 'load' event.
 */
function interceptAudioHotspots() {
    var panorama = document.getElementById('panorama');
    if (!panorama) return;

    // Wrap any existing audio hotspots
    panorama.querySelectorAll('.audio-hotspot').forEach(wrapAudioHotspot);

    // Watch for new ones (scene changes, etc.)
    if (!panorama.dataset.audioObserver) {
        panorama.dataset.audioObserver = '1';
        var observer = new MutationObserver(function(mutations) {
            for (var m = 0; m < mutations.length; m++) {
                var addedNodes = mutations[m].addedNodes;
                for (var n = 0; n < addedNodes.length; n++) {
                    var node = addedNodes[n];
                    if (node.nodeType === 1) {
                        if (node.classList && node.classList.contains('audio-hotspot')) {
                            wrapAudioHotspot(node);
                        }
                        if (node.querySelectorAll) {
                            node.querySelectorAll('.audio-hotspot').forEach(wrapAudioHotspot);
                        }
                    }
                }
            }
        });
        observer.observe(panorama, { childList: true, subtree: true });
    }

    // Remove playing class when audio ends
    audioPlayer.onended = function() {
        document.querySelectorAll('.audio-hotspot.playing').forEach(function(el) {
            el.classList.remove('playing');
        });
    };
}

// ── Video Hotspot Support ───────────────────────────────────────────────────

const videoOverlay = document.getElementById('video-overlay');
const videoPlayer = document.getElementById('video-overlay-player');
const videoClose = document.getElementById('video-overlay-close');

/** Detect YouTube URL and return embed URL, or null if not YouTube */
function youtubeEmbedUrl(url) {
    var m = url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/)([a-zA-Z0-9_-]{11})/);
    return m ? 'https://www.youtube.com/embed/' + m[1] + '?autoplay=1' : null;
}

function showVideoOverlay(videoUrl) {
    videoPlayer.innerHTML = '';
    var ytEmbed = youtubeEmbedUrl(videoUrl);
    if (ytEmbed) {
        // YouTube: use iframe embed
        var iframe = document.createElement('iframe');
        iframe.src = ytEmbed;
        iframe.style.cssText = 'position:absolute;inset:0;width:100%;height:100%;border:0;';
        iframe.allow = 'autoplay; encrypted-media';
        iframe.allowFullscreen = true;
        videoPlayer.appendChild(iframe);
    } else {
        // Commons or direct video: use <video> tag
        var video = document.createElement('video');
        video.src = videoUrl;
        video.controls = true;
        video.autoplay = true;
        video.style.cssText = 'position:absolute;inset:0;width:100%;height:100%;';
        videoPlayer.appendChild(video);
    }
    videoOverlay.style.display = 'flex';
}

function hideVideoOverlay() {
    videoOverlay.style.display = 'none';
    videoPlayer.innerHTML = '';
}

// Close button, backdrop click, Escape key
videoClose.addEventListener('click', hideVideoOverlay);
videoOverlay.addEventListener('click', function(e) {
    if (e.target === videoOverlay) hideVideoOverlay();
});
document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape' && videoOverlay.style.display === 'flex') hideVideoOverlay();
});

function wrapVideoHotspot(el) {
    if (el.dataset.videoWrapped) return;
    el.dataset.videoWrapped = '1';

    var sceneId = currentScene;
    var scene = tourData && tourData.scenes && tourData.scenes[sceneId];
    var videoUrls = [];
    if (scene && scene.hotSpots) {
        for (var i = 0; i < scene.hotSpots.length; i++) {
            if (scene.hotSpots[i].hotspotSubtype === 'video' && scene.hotSpots[i].videoUrl) {
                videoUrls.push(scene.hotSpots[i].videoUrl);
            }
        }
    }

    var allVideo = document.querySelectorAll('.video-hotspot');
    var domIdx = Array.prototype.indexOf.call(allVideo, el);
    var rawUrl = videoUrls[domIdx] || null;

    // Pre-resolve Commons File: references (also handles Commons page URLs via server)
    if (rawUrl) {
        var fileMatch = rawUrl.match(/(?:^File:|commons\.wikimedia\.org\/wiki\/File:)\s*(.+)$/i);
        if (fileMatch) {
            fetch('/api/resolve?file=' + encodeURIComponent(fileMatch[1].trim()))
                .then(function(r) { return r.json(); })
                .then(function(data) { el.dataset.resolvedVideoUrl = data.original || data.url; })
                .catch(function() {});
        }
    }

    el.onclick = function(e) {
        e.preventDefault();
        e.stopPropagation();
        var playUrl = el.dataset.resolvedVideoUrl || rawUrl;
        if (playUrl) showVideoOverlay(playUrl);
        return false;
    };
}

function interceptVideoHotspots() {
    var panorama = document.getElementById('panorama');
    if (!panorama) return;
    panorama.querySelectorAll('.video-hotspot').forEach(wrapVideoHotspot);
    if (!panorama.dataset.videoObserver) {
        panorama.dataset.videoObserver = '1';
        var observer = new MutationObserver(function(mutations) {
            for (var m = 0; m < mutations.length; m++) {
                var addedNodes = mutations[m].addedNodes;
                for (var n = 0; n < addedNodes.length; n++) {
                    var node = addedNodes[n];
                    if (node.nodeType === 1) {
                        if (node.classList && node.classList.contains('video-hotspot')) {
                            wrapVideoHotspot(node);
                        }
                        if (node.querySelectorAll) {
                            node.querySelectorAll('.video-hotspot').forEach(wrapVideoHotspot);
                        }
                    }
                }
            }
        });
        observer.observe(panorama, { childList: true, subtree: true });
    }
}

// ── Wikipedia Rich Info Cards ────────────────────────────────────────────────

const WP_API = 'https://en.wikipedia.org/api/rest_v1/page/summary/';

function wikipediaCardTooltip(hotSpotDiv, args) {
    hotSpotDiv.classList.add('wp-card-hotspot');
    var card = document.createElement('div');
    card.className = 'wp-card-tooltip';
    card.innerHTML = '<button class="info-popup-close" title="Close">×</button><div class="wp-card-loading">Loading...</div>';
    hotSpotDiv.appendChild(card);
    card.querySelector('.info-popup-close').onclick = function(e) { e.stopPropagation(); card.classList.remove('visible'); };

    // Fetch article summary from Wikipedia API
    var title = args.title;
    fetch(WP_API + encodeURIComponent(title))
        .then(function(r) { return r.json(); })
        .then(function(data) {
            var img = data.thumbnail ?
                '<img src="' + data.thumbnail.source + '" style="width:' + (data.thumbnail.width || 200) + 'px;max-width:200px;border-radius:6px 6px 0 0;" />' : '';
            var extract = data.extract || '';
            if (extract.length > 300) extract = extract.substring(0, 300) + '...';
            card.innerHTML = '<button class="info-popup-close" title="Close">×</button>' + img +
                '<div class="wp-card-body">' +
                '<h3>' + escapeHTML(data.title || title) + '</h3>' +
                '<p>' + escapeHTML(extract) + '</p>' +
                '<a href="' + (data.content_urls?.desktop?.page || args.url) + '" target="_blank" class="wp-card-link">Read on Wikipedia →</a>' +
                '</div>';
            card.querySelector('.info-popup-close').onclick = function(e) { e.stopPropagation(); card.classList.remove('visible'); };
        })
        .catch(function() {
            card.innerHTML = '<button class="info-popup-close" title="Close">×</button><div class="wp-card-body">' +
                '<h3>' + escapeHTML(title.replace(/_/g, ' ')) + '</h3>' +
                '<a href="' + args.url + '" target="_blank" class="wp-card-link">View on Wikipedia →</a>' +
                '</div>';
            card.querySelector('.info-popup-close').onclick = function(e) { e.stopPropagation(); card.classList.remove('visible'); };
        });
}

function enrichHotspots(scenes) {
    for (var sceneId in scenes) {
        var scene = scenes[sceneId];
        if (!scene.hotSpots) continue;
        for (var i = 0; i < scene.hotSpots.length; i++) {
            var hs = scene.hotSpots[i];
            // Tag ALL hotspot types via createTooltipFunc — Pannellum 2.5.7 applies
            // cssClass to different divs depending on type, but createTooltipFunc
            // consistently receives the base div where our CSS classes need to live.
            var tagClass = null;
            if (hs.type === 'scene') {
                tagClass = 'scene-hotspot';
            } else if (hs.hotspotSubtype === 'audio') {
                tagClass = 'audio-hotspot';
            } else if (hs.hotspotSubtype === 'video') {
                tagClass = 'video-hotspot';
            } else if (hs.URL && isWikipediaUrl(hs.URL)) {
                // Wikipedia cards: wikipediaCardTooltip adds wp-card-hotspot
                var title = extractWikipediaTitle(hs.URL);
                if (title) {
                    hs.createTooltipFunc = wikipediaCardTooltip;
                    hs.createTooltipArgs = { title: title, url: hs.URL };
                }
            } else if (hs.type === 'info') {
                tagClass = 'info-hotspot';
            }
            // Stamp the tag class via a lightweight tooltip function
            if (tagClass && !hs.createTooltipFunc) {
                hs.createTooltipFunc = (function(cls) {
                    return function(div) { div.classList.add(cls); };
                })(tagClass);
                hs.createTooltipArgs = {};
            }
            // Keep cssClass for Pannellum's own use (it may still apply to child divs)
            if (tagClass) {
                hs.cssClass = (hs.cssClass ? hs.cssClass + ' ' : '') + tagClass;
            }
        }
    }
    return scenes;
}

// ── Info Click-to-Toggle ────────────────────────────────────────────────────

function _doInterceptInfo(panorama) {
    panorama.querySelectorAll('.info-hotspot, .wp-card-hotspot').forEach(function(el) {
        if (el.dataset.infoIntercepted) return;
        el.dataset.infoIntercepted = '1';
        el.onmouseenter = null;
        el.onmouseleave = null;
        el.onclick = function(e) {
            e.preventDefault(); e.stopPropagation();
            var card = this.querySelector('.wp-card-tooltip');
            if (card) { card.classList.toggle('visible'); }
            else {
                var t = this.querySelector('.pnlm-tooltip');
                if (t) t.style.setProperty('display', t.style.display==='block'?'none':'block','important');
            }
            return false;
        };
    });
    if (!panorama.dataset.infoObserver) {
        panorama.dataset.infoObserver = '1';
        new MutationObserver(function(){ _doInterceptInfo(panorama); }).observe(panorama, {childList:true,subtree:true});
    }
}

function interceptInfoHotspots() {
    var p = document.getElementById('panorama');
    if (p) _doInterceptInfo(p);
}

// ── Show/Hide All ──────────────────────────────────────────────────────────

var _showingAllInfo = false;
var toggleAllInfoBtn = document.getElementById('toggleAllInfoBtn');
if (toggleAllInfoBtn) {
    toggleAllInfoBtn.addEventListener('click', function() {
        _showingAllInfo = !_showingAllInfo;
        var cards = document.querySelectorAll('.wp-card-tooltip');
        var tips = document.querySelectorAll('.pnlm-hotspot-base .pnlm-tooltip');
        if (_showingAllInfo) {
            toggleAllInfoBtn.textContent = '🙈 Hide all popups';
            cards.forEach(function(c){ c.classList.add('visible'); });
            tips.forEach(function(t){ t.style.setProperty('display','block','important'); });
        } else {
            toggleAllInfoBtn.textContent = '👁 Show all popups';
            cards.forEach(function(c){ c.classList.remove('visible'); });
            tips.forEach(function(t){ t.style.setProperty('display','none','important'); });
        }
    });
}

// ── Open Hotspots from URL ─────────────────────────────────────────────────

var _openedFromURL = false;
function openHotspotsFromURL() {
    if (_openedFromURL) return;
    _openedFromURL = true;
    var params = new URLSearchParams(window.location.hash.slice(1));
    var openParam = params.get('open');
    if (!openParam) return;
    var indices = openParam.split(',').map(function(s){return parseInt(s.trim(),10);}).filter(function(n){return !isNaN(n);});
    var all = document.querySelectorAll('#panorama .pnlm-hotspot-base');
    indices.forEach(function(idx){
        if (idx >= 0 && idx < all.length) {
            var el = all[idx];
            if (!el.classList.contains('scene-hotspot') && !el.classList.contains('audio-hotspot') && !el.classList.contains('video-hotspot')) {
                el.click();
            }
        }
    });
}

function isWikipediaUrl(url) {
    return /\.wikipedia\.org\/wiki\//i.test(url) ||
           /qrwp\.org\//i.test(url) ||
           /en\.wikipedia\.org/i.test(url);
}

function extractWikipediaTitle(url) {
    // Match /wiki/Page_Title or /Page_Title from qrwp.org
    var m = url.match(/\/wiki\/([^?#]+)/i);
    if (m) return decodeURIComponent(m[1]);
    // Match qrwp.org/Page_Title format
    m = url.match(/qrwp\.org\/([^?#]+)/i);
    if (m) return decodeURIComponent(m[1]);
    return null;
}

function loadPreviewConfig(config) {
    // Clear the placeholder text from the panorama container
    document.getElementById('panorama').innerHTML = '';

    // Add Wikipedia card tooltips to hotspots
    if (config.scenes) enrichHotspots(config.scenes);

    tourData = config;
    if (config.default && config.default.autoLoad === undefined) {
        config.default.autoLoad = true;
    }
    const firstScene = config.default.firstScene;
    currentScene = firstScene;
    viewer = pannellum.viewer('panorama', config);
    viewer.on('scenechange', function(sceneId) {
        currentScene = sceneId;
        renderSceneList();
        interceptAudioHotspots();
                interceptVideoHotspots();
                interceptInfoHotspots();
    });
    viewer.on('load', function() {
        interceptAudioHotspots();
                interceptVideoHotspots();
                interceptInfoHotspots();
        setStatus('Preview loaded \u2713', 'ok');
    });
    viewer.on('error', function(err) {
        console.error('Pannellum error:', err);
        setStatus('Viewer error: ' + err, 'error');
    });
    renderSceneList();
    renderTourInfo();
    document.getElementById('tourInput').value = '[Studio Preview]';
    const info = document.getElementById('tourInfo');
    info.style.display = 'block';
    info.innerHTML = '<p><span class="label">Source:</span> Studio Preview</p>' +
        '<p><span class="label">Scenes:</span> ' + Object.keys(config.scenes || {}).length + '</p>';
}

// ── UI Handlers ─────────────────────────────────────────────────────────────

function handleLoad() {
    const input = document.getElementById('tourInput');
    const tourPage = input.value.trim();
    if (!tourPage) {
        setStatus('Please enter a wiki page title', 'error');
        return;
    }

    const configUrl = CONFIG_BACKEND + encodeURIComponent(tourPage);
    loadTour(configUrl);
}

function handleKeyPress(e) {
    if (e.key === 'Enter') {
        handleLoad();
    }
}

// ── Utility ─────────────────────────────────────────────────────────────────

function escapeHTML(str) {
    if (!str) return '';
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
}

// ── Init ────────────────────────────────────────────────────────────────────

document.addEventListener('DOMContentLoaded', function() {
    document.getElementById('loadBtn').addEventListener('click', handleLoad);
    document.getElementById('tourInput').addEventListener('keypress', handleKeyPress);

    // Auto-load from URL hash
    const hash = window.location.hash.slice(1);
    if (hash) {
        // localStorage preview (from studio — persistent, cross-tab)
        if (hash === 'preview=local' || hash === 'preview=session') {
            try {
                const stored = localStorage.getItem('photosphere-preview-tour') || sessionStorage.getItem('photosphere-preview-tour');
                if (!stored) throw new Error('No preview data found. Go back to the studio and click Preview again.');
                const config = JSON.parse(stored);
                loadPreviewConfig(config);
            } catch(e) {
                console.error('Preview error:', e);
                setStatus('Preview error: ' + e.message, 'error');
            }
            return;
        }
        // Server-side preview: short key
        if (hash.startsWith('preview=')) {
            const key = hash.slice(8);
            setStatus('Loading preview...', 'loading');
            fetch(`/api/preview/${key}`)
                .then(r => {
                    if (!r.ok) throw new Error('Preview not found');
                    return r.json();
                })
                .then(config => {
                    tourData = config;
                    if (config.scenes) enrichHotspots(config.scenes);
                    if (config.default && config.default.autoLoad === undefined) {
                        config.default.autoLoad = true;
                    }
                    currentScene = config.default.firstScene;
                    viewer = pannellum.viewer('panorama', config);
                    viewer.on('scenechange', function(sceneId) {
                        currentScene = sceneId;
                        renderSceneList();
                        interceptAudioHotspots();
                interceptVideoHotspots();
                interceptInfoHotspots();
                    });
                    viewer.on('load', function() {
                        interceptAudioHotspots();
                interceptVideoHotspots();
                interceptInfoHotspots();
                        setStatus('Preview loaded \u2713', 'ok');
                    });
                    viewer.on('error', function(err) {
                        setStatus('Viewer error: ' + err, 'error');
                    });
                    renderSceneList();
                    renderTourInfo();
                    document.getElementById('tourInput').value = '[Studio Preview]';
                    const info = document.getElementById('tourInfo');
                    info.style.display = 'block';
                    info.innerHTML = '<p><span class="label">Source:</span> Studio Preview</p>' +
                        '<p><span class="label">Scenes:</span> ' + Object.keys(config.scenes || {}).length + '</p>';
                })
                .catch(e => {
                    setStatus('Error: ' + e.message, 'error');
                });
            return;
        }
        // Studio preview: inline JSON data (legacy)
        if (hash.startsWith('data=')) {
            try {
                const json = decodeURIComponent(hash.slice(5));
                const config = JSON.parse(json);
                loadPreviewConfig(config);
                return;
            } catch(e) {
                console.error('Failed to parse inline tour data:', e);
                setStatus('Error: Invalid preview data', 'error');
            }
        }
        // Standard wiki page title
        document.getElementById('tourInput').value = hash;
        handleLoad();
    } else {
        // Auto-load the example tour on page load
        handleLoad();
    }
});
</script>
